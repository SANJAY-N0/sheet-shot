<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <style>
        body {
            width: 380px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 15px;
            margin: 0;
            background-color: #0f141c;
            color: #adbac7;
        }

        /* Top Header Navbar Branding Elements */
        .header-main {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .header-title {
            font-size: 16px;
            font-weight: bold;
            color: #a371f7;
            margin: 0;
            cursor: pointer;
        }

        .header-icons {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            background: #22272e;
            border: 1px solid #373e47;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            cursor: pointer;
            color: #adbac7;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
        }

        .icon-btn:hover {
            background: #2d333b;
        }

        /* Page View Display Layers */
        .view-section {
            display: none;
        }

        .view-section.active {
            display: block;
        }

        /* Card Structures */
        .card {
            background: #1c2128;
            border: 1px solid #2d333b;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 14px;
            position: relative;
        }

        .card-title-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .card-title {
            margin: 0;
            font-size: 12px;
            font-weight: bold;
            color: #adbac7;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .badge {
            background: #22272e;
            border: 1px solid #373e47;
            border-radius: 6px;
            font-size: 10px;
            padding: 2px 6px;
            color: #768390;
            font-weight: bold;
        }

        label {
            font-size: 11px;
            color: #768390;
            display: inline-block;
            font-weight: bold;
        }

        /* FIXED COORDINATE BADGE ALIGNMENT */
        .coord-label {
            font-size: 11px;
            color: #58a6ff;
            font-weight: bold;
            background: #1f242c;
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid #2d333b;
            margin-left: 6px;
            display: inline-block;
        }

        .display-text {
            font-size: 18px;
            font-weight: bold;
            color: white;
            margin: 8px 0 12px 0;
            min-height: 24px;
        }

        /* Button Layout Grid */
        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        button {
            flex: 1;
            padding: 10px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            transition: background 0.2s, transform 0.1s;
        }

        button:active {
            transform: scale(0.98);
        }

        .nav-btn-prev {
            background: #2d333b;
            color: #adbac7;
            border: 1px solid #373e47;
        }

        .nav-btn-prev:hover {
            background: #343b44;
        }

        .nav-btn-next {
            background: linear-gradient(135deg, #7928ca, #ff0080);
            color: white;
        }

        .nav-btn-next:hover {
            opacity: 0.9;
        }

        .green-add-btn {
            background: #10b981;
            color: #0f141c;
            width: 100%;
            font-size: 13px;
            font-weight: 800;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
        }

        .green-add-btn:hover {
            background: #059669;
        }

        .footer-action-btn {
            background: #22272e;
            color: white;
            border: 1px solid #373e47;
            padding: 12px;
            flex: 4;
        }

        .footer-action-btn:hover {
            background: #2d333b;
        }

        .refresh-btn {
            background: #22272e;
            color: #adbac7;
            border: 1px solid #373e47;
            flex: 1;
            padding: 12px;
        }

        .refresh-btn:hover {
            background: #2d333b;
            color: #58a6ff;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            background: #22272e;
            border: 1px solid #373e47;
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
            font-size: 12px;
        }

        input:focus {
            border-color: #58a6ff;
            outline: none;
        }

        .status-badge {
            display: inline-block;
            padding: 2px 6px;
            font-size: 10px;
            font-weight: bold;
            border-radius: 4px;
            margin-top: 6px;
        }

        .logged-out {
            background: #3c1e22;
            color: #f85149;
        }

        .logged-in {
            background: #1b3c22;
            color: #56d364;
        }
    </style>
</head>

<body>

    <div class="header-main">
        <div class="header-title" id="ext-title-nav" style="display:flex; align-items:center; gap:8px;">
            <img src="icon48.png" alt="logo"
                 style="width:22px; height:22px; border-radius:6px; object-fit:contain; flex-shrink:0;">
            Google Sheet Viewer Pro
        </div>
        <div class="header-icons">
            <div class="icon-btn" id="btn-toggle-theme">🌗</div>
            <div class="icon-btn" id="btn-goto-settings">⚙️</div>
        </div>
    </div>

    <div id="page-main" class="view-section active">

        <div class="card">
            <div class="card-title-row">
                <h3 class="card-title">👤 Name Viewer</h3>
                <span class="badge">Fixed Col C</span>
            </div>
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div><label>Target:</label>
                <span class="coord-label" id="b1-coord-lbl">Cell: C-9</span></div>
                <button id="b1-link-btn"
                    style="display:none; background:#1f3a5f; color:#58a6ff; border:1px solid #2d5986;
                           border-radius:6px; padding:4px 10px; font-size:11px; font-weight:bold;
                           cursor:pointer; flex:none; white-space:nowrap;">🔗 Open Link</button>
            </div>
            <div id="b1-text-val" class="display-text"
                style="cursor:default; transition:color 0.2s, text-decoration 0.2s;">
                Loading...
            </div>
            <div class="btn-row">
                <button id="btn-b1-prev" class="nav-btn-prev">◀ Prev Row</button>
                <button id="btn-b1-next" class="nav-btn-next">Next Row ▶</button>
            </div>
        </div>

        <div class="card">
            <div class="card-title-row">
                <h3 class="card-title">🔗 Value Viewer</h3>
                <span class="badge">Fixed Row 8</span>
            </div>
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div><label>Target:</label>
                <span class="coord-label" id="b2-coord-lbl" style="color:#a371f7;">Cell: E-8</span></div>
            </div>
            <div id="b2-text-val"
                style="font-size:18px; font-weight:bold; color:#58a6ff; margin:8px 0 8px 0;
                       min-height:24px; cursor:default; transition:color 0.2s;">
                Loading...
            </div>
            <!-- Open Link button — always visible, enabled only when URL is found -->
            <button id="b2-link-btn"
                style="width:100%; margin-bottom:10px; padding:8px;
                       background:#1a2a3a; color:#3a6a9a; border:1px solid #2a4a6a;
                       border-radius:8px; font-size:12px; font-weight:bold; cursor:not-allowed;
                       opacity:0.5; transition:all 0.2s;" disabled>
                🔗 Open Link
            </button>
            <div class="btn-row">
                <button id="btn-b2-prev" class="nav-btn-prev">◀ Prev Col</button>
                <button id="btn-b2-next" class="nav-btn-next">Next Col ▶</button>
            </div>
        </div>

        <!-- Block 3: CRUD — intersection of B1 row × B2 column -->
        <div style="background:linear-gradient(145deg,#0d1b2a,#112240); border:1px solid #1e3a5f;
                    border-radius:14px; padding:16px; margin-bottom:14px; position:relative;
                    box-shadow:0 0 18px rgba(0,168,255,0.08);">
            <div class="card-title-row">
                <h3 class="card-title" style="color:#00c8ff;">🔢 Cell Editor</h3>
                <span style="background:#0a1628; border:1px solid #1e3a5f; border-radius:6px;
                             font-size:10px; padding:2px 8px; color:#4a8fbf; font-weight:bold;">B1 row × B2 col</span>
            </div>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                <div><label style="color:#4a8fbf;">Target:</label>
                <span style="font-size:11px; color:#00c8ff; font-weight:bold; background:#0a1628;
                             padding:2px 8px; border-radius:4px; border:1px solid #1e3a5f;
                             margin-left:6px;" id="b3-coord-lbl">Cell: —</span></div>
            </div>
            <label style="display:block; color:#4a8fbf; font-size:11px; font-weight:bold; margin-bottom:4px;">Cell Value:</label>
            <input type="number" id="b3-val-input" value="0"
                style="width:100%; font-size:26px; font-weight:900; color:#00e5ff;
                       background:#071220; border:2px solid #1e4d7a; border-radius:10px;
                       padding:10px; margin-bottom:10px; text-align:center; box-sizing:border-box;
                       box-shadow:0 0 12px rgba(0,200,255,0.15); letter-spacing:2px;">

            <!-- CRUD Actions -->
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:6px;">
                <button id="btn-b3-save"
                    style="background:#0a2540; color:#00c8ff; border:1.5px solid #1e5a8a;
                           border-radius:10px; padding:10px; font-size:12px; font-weight:800;
                           cursor:pointer; transition:all 0.2s;"
                    onmouseover="this.style.background='#0e3360'"
                    onmouseout="this.style.background='#0a2540'">💾 SAVE</button>
                <button id="btn-counter-add"
                    style="background:linear-gradient(135deg,#0077b6,#00c8ff); color:#071220;
                           border:none; border-radius:10px; padding:10px; font-size:13px;
                           font-weight:900; cursor:pointer; transition:all 0.2s;
                           box-shadow:0 4px 12px rgba(0,200,255,0.3);"
                    onmouseover="this.style.opacity='0.85'"
                    onmouseout="this.style.opacity='1'">➕ ADD +1</button>
            </div>
            <!-- Write status feedback -->
            <div id="b3-write-status"
                style="font-size:11px; font-weight:bold; text-align:center;
                       min-height:16px; margin-bottom:8px; transition:color 0.3s;"></div>


            <!-- Row Navigation (drives Block 1 row) -->
            <label style="display:block; color:#334d66; font-size:10px; margin-bottom:4px;">↕ Row (same as Block 1)</label>
            <div style="display:flex; gap:8px; margin-bottom:8px;">
                <button id="btn-b3-row-prev"
                    style="flex:1; background:#0a1628; color:#4a8fbf; border:1px solid #1e3a5f;
                           border-radius:8px; padding:8px; font-size:12px; font-weight:bold; cursor:pointer;">◀ Prev Row</button>
                <button id="btn-b3-row-next"
                    style="flex:1; background:linear-gradient(135deg,#0a3060,#0d4a8a); color:#90d5ff;
                           border:none; border-radius:8px; padding:8px; font-size:12px; font-weight:bold; cursor:pointer;">Next Row ▶</button>
            </div>

            <!-- Col Navigation (drives Block 2 column) -->
            <label style="display:block; color:#334d66; font-size:10px; margin-bottom:4px;">↔ Column (same as Block 2)</label>
            <div style="display:flex; gap:8px;">
                <button id="btn-b3-col-prev"
                    style="flex:1; background:#0a1628; color:#4a8fbf; border:1px solid #1e3a5f;
                           border-radius:8px; padding:8px; font-size:12px; font-weight:bold; cursor:pointer;">◀ Prev Col</button>
                <button id="btn-b3-col-next"
                    style="flex:1; background:linear-gradient(135deg,#0a3060,#0d4a8a); color:#90d5ff;
                           border:none; border-radius:8px; padding:8px; font-size:12px; font-weight:bold; cursor:pointer;">Next Col ▶</button>
            </div>
        </div>


        <div style="display: flex; gap: 10px; margin-top: 5px;">
            <button id="btn-open-live-url" class="footer-action-btn">Open Sheet</button>
            <button id="btn-force-sync" class="refresh-btn">🔄</button>
        </div>
    </div>

    <div id="page-settings" class="view-section">
        <div class="card">
            <h3 style="color: #a371f7;">🔐 Authentication Profiles</h3>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 8px;">
                <span id="auth-status" class="status-badge logged-out">● Not Logged In</span>
                <div id="profile-area" style="font-size: 11px;"></div>
            </div>
            <div class="btn-row">
                <button id="btn-login" style="background: #6f42c1; color: white;">Link Google Account</button>
                <button id="btn-logout" style="background: #da3637; color: white;">Disconnect</button>
            </div>
        </div>

        <div class="card">
            <h3 style="color: #adbac7;">📊 Spreadsheet Registry</h3>
            <label>Google Spreadsheet Link</label>
            <input type="text" id="cfg-sheet-link" placeholder="https://docs.google.com/spreadsheets/d/.../edit">

            <label>Sheet Tab Name (e.g. MERN, MERN_DS, Sheet3)</label>
            <input type="text" id="cfg-sheet-name" placeholder="Sheet1" value="MERN_DS"
                style="font-weight:bold; color:#a371f7;">

            <div style="display:flex; gap:10px;">
                <div style="flex:1;">
                    <label>Block 1 Column (Name col)</label>
                    <input type="text" id="cfg-b1-col" value="C" placeholder="C"
                        style="text-transform:uppercase;">
                </div>
                <div style="flex:1;">
                    <label>Block 2 Column &mdash; Row 8</label>
                    <input type="text" id="cfg-b2-col" value="F" placeholder="F"
                        style="text-transform:uppercase;">
                </div>
            </div>

            <p style="font-size:10px; color:#555f69; margin:8px 0 0;">
                🔒 Block 3 = Block 1 row × Block 2 col (auto-intersection).
            </p>

            <button id="btn-validate" class="green-add-btn"
                style="margin-top: 15px; background: #a371f7; color: white;">Validate &amp; Fetch Sync</button>
        </div>
    </div>

    <script src="popup.js"></script>
</body>

</html>
